<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medixor - Offline</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 500px;
    }
    h1 {
      font-size: 48px;
      margin: 0 0 20px 0;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      margin: 0 0 30px 0;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    button {
      background: white;
      color: #667eea;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    .status {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Offline Mode</h1>
    <p>
      Medixor is working in offline mode. All your data is stored locally
      and will sync when you're back online.
    </p>
    <button onclick="location.reload()">Retry Connection</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    // Check connection status
    setInterval(() => {
      const status = navigator.onLine ? '🟢 Connected' : '🔴 Offline';
      document.getElementById('status').textContent = status;
    }, 1000);

    // Auto-reload when back online
    window.addEventListener('online', () => {
      setTimeout(() => location.reload(), 1000);
    });
  </script>
</body>
</html>
